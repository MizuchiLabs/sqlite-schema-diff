# vim: set ts=2 sw=2 tw=0 fo=cnqoj
version: 2
project_name: sqlite-schema-diff
report_sizes: true

before:
  hooks:
    - go fmt ./...
    - go vet ./...
    - go test ./...
    - go mod download
    - go mod verify

gomod:
  proxy: true

builds:
  - binary: "{{ .ProjectName }}"
    env: [CGO_ENABLED=0]
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w
      - -X main.Version={{ .Version }}
      - -X main.Commit={{ .Commit }}
      - -X main.Date={{ .CommitDate }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - riscv64
    ignore:
      - goos: windows
        goarch: arm64

upx:
  - enabled: true
    lzma: true
    compress: best
    goos: [linux]

signs:
  - cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--yes"
      - "${artifact}"
      - "--bundle=${signature}"

sboms:
  - cmd: syft
    documents:
      - "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}.sbom.json"
    args: ["$artifact", "--output", "cyclonedx-json=$document"]
    artifacts: binary

source:
  enabled: true

archives:
  - formats: [binary]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

release:
  draft: false
  replace_existing_draft: true
  replace_existing_artifacts: true
  mode: append

changelog:
  disable: true
