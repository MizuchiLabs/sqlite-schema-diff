version: "3"

env:
  CGO_ENABLED: 0

tasks:
  diff:
    desc: Run diff
    cmds:
      - go run . diff --db ./examples/example.db -s ./examples/schema/

  apply:
    desc: Run apply
    cmds:
      - go run . apply --db ./examples/example.db -s ./examples/schema/

  examples:
    desc: Run examples
    dir: examples
    cmds:
      - go run .

  # 󰚰 Update deps
  update:
    desc: Update dependencies
    cmds:
      - go get -u ./...

  # 󰉠  Lint / static checks
  lint:
    desc: Run go vet & lint
    cmds:
      - go mod tidy
      - go fmt ./...
      - go vet ./...
      - govulncheck ./...
      - go test -cover ./...
      - gosec -exclude-generated ./...

  coverage:
    desc: Run coverage
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out

  build:
    desc: Build binary
    cmds:
      - go build -ldflags="-s -w" -trimpath -o sqlite-schema-diff

  snapshot:
    desc: Build snapshot
    cmds:
      - goreleaser --snapshot --clean --skip=validate,sign,sbom,archive
